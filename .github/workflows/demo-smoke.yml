name: Demo Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    name: Static safety checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Assert no runtime state committed
        run: bash scripts/assert-no-runtime-state.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check example envelopes are safe
        run: |
          for f in README.md QUICKSTART.md TRUST-PROOF.md TRY-YOUR-REPO.md PUBLIC-CONTRACT.md docs/*.md examples/cli/*.json examples/reports/*.md; do
            echo "Checking $f..."
            node scripts/assert-output-safe.js "$f"
          done

      - name: Validate fixture pantheon.json
        run: |
          VERSION=$(python3 -c "import json; data=json.load(open('fixtures/trust-bite-app/pantheon.json')); print(data['version'])")
          PROTECTED_COUNT=$(python3 -c "import json; data=json.load(open('fixtures/trust-bite-app/pantheon.json')); print(len(data.get('protected', [])))")
          REVIEW_COUNT=$(python3 -c "import json; data=json.load(open('fixtures/trust-bite-app/pantheon.json')); print(len(data.get('review_required', [])))")
          if [ "$VERSION" != "1" ]; then
            echo "ERROR: pantheon.json version must be 1, got: $VERSION"
            exit 1
          fi
          if [ "$PROTECTED_COUNT" -lt 1 ]; then
            echo "ERROR: pantheon.json must declare at least one protected path"
            exit 1
          fi
          if [ "$REVIEW_COUNT" -lt 1 ]; then
            echo "ERROR: pantheon.json must declare at least one review_required path"
            exit 1
          fi
          echo "PASS: pantheon.json uses the current loader shape"

      - name: Validate patch applies cleanly
        run: |
          WORK=$(mktemp -d)
          cp -r fixtures/trust-bite-app/. "$WORK/"
          cd "$WORK"
          git init -q
          git add -A
          git -c user.name="clarion-demo" -c user.email="clarion-demo@example.invalid" commit -q -m "init"
          git apply "$GITHUB_WORKSPACE/scenarios/bite/patches/protected-policy-change.patch"
          echo "PASS: Patch applies cleanly"
          rm -rf "$WORK"

      - name: Run fixture tests
        run: |
          cd fixtures/trust-bite-app
          python3 tests/test_policy_engine.py
