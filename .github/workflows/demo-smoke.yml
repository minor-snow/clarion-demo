name: Demo Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    name: Static safety checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Assert no runtime state committed
        run: bash scripts/assert-no-runtime-state.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check example envelopes are safe
        run: |
          for f in examples/cli/*.json; do
            echo "Checking $f..."
            node scripts/assert-output-safe.js "$f"
          done

      - name: Validate fixture pantheon.json
        run: |
          # Ensure version field is present and equals 1
          VERSION=$(python3 -c "import json; print(json.load(open('fixtures/trust-bite-app/pantheon.json'))['version'])")
          if [ "$VERSION" != "1" ]; then
            echo "ERROR: pantheon.json version must be 1, got: $VERSION"
            exit 1
          fi
          echo "PASS: pantheon.json version is 1"

      - name: Validate patch applies cleanly
        run: |
          WORK=$(mktemp -d)
          cp -r fixtures/trust-bite-app/. "$WORK/"
          cd "$WORK"
          git init -q
          git add -A
          git commit -q -m "init"
          git apply "$GITHUB_WORKSPACE/scenarios/bite/patches/protected-policy-change.patch"
          echo "PASS: Patch applies cleanly"
          rm -rf "$WORK"

      - name: Run fixture tests
        run: |
          cd fixtures/trust-bite-app
          python3 tests/test_policy_engine.py
