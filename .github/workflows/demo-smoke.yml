name: Demo Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    name: Static safety checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Assert no runtime state committed
        run: bash scripts/assert-no-runtime-state.sh

      - name: Assert surface consistency (drift regression)
        run: bash scripts/assert-surface-consistency.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check example envelopes are safe
        run: |
          for f in README.md QUICKSTART.md TRUST-PROOF.md TRY-YOUR-REPO.md PUBLIC-CONTRACT.md docs/*.md examples/cli/*.json examples/reports/*.md; do
            echo "Checking $f..."
            node scripts/assert-output-safe.js "$f"
          done

      - name: Validate fixture pantheon.json
        run: |
          VERSION=$(python3 -c "import json; data=json.load(open('fixtures/trust-bite-app/pantheon.json')); print(data['version'])")
          PROTECTED_COUNT=$(python3 -c "import json; data=json.load(open('fixtures/trust-bite-app/pantheon.json')); print(len(data.get('protected', [])))")
          REVIEW_COUNT=$(python3 -c "import json; data=json.load(open('fixtures/trust-bite-app/pantheon.json')); print(len(data.get('review_required', [])))")
          if [ "$VERSION" != "1" ]; then
            echo "ERROR: pantheon.json version must be 1, got: $VERSION"
            exit 1
          fi
          if [ "$PROTECTED_COUNT" -lt 1 ]; then
            echo "ERROR: pantheon.json must declare at least one protected path"
            exit 1
          fi
          if [ "$REVIEW_COUNT" -lt 1 ]; then
            echo "ERROR: pantheon.json must declare at least one review_required path"
            exit 1
          fi
          echo "PASS: pantheon.json uses the current loader shape"

      - name: Ensure mirror config stays byte-equivalent
        run: |
          cmp -s fixtures/trust-bite-app/pantheon.json fixtures/trust-bite-app/pantheon.alpha.json
          echo "PASS: pantheon.alpha.json mirrors pantheon.json exactly"

      - name: Validate patch applies cleanly
        run: |
          WORK=$(mktemp -d)
          cp -r fixtures/trust-bite-app/. "$WORK/"
          cd "$WORK"
          git init -q
          git add -A
          git -c user.name="clarion-demo" -c user.email="clarion-demo@example.invalid" commit -q -m "init"
          git apply "$GITHUB_WORKSPACE/scenarios/bite/patches/protected-policy-change.patch"
          echo "PASS: Patch applies cleanly"
          rm -rf "$WORK"

      - name: Run fixture tests
        run: |
          cd fixtures/trust-bite-app
          python3 tests/test_policy_engine.py

  runtime-public-entrypoints:
    name: Runtime public entrypoints
    runs-on: ubuntu-latest
    if: ${{ vars.CLARION_ENGINE_AVAILABLE == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Clarion binary
        env:
          CLARION_DOWNLOAD_URL: ${{ vars.CLARION_DOWNLOAD_URL }}
        run: |
          if [ -z "$CLARION_DOWNLOAD_URL" ]; then
            echo "ERROR: CLARION_DOWNLOAD_URL not set"
            exit 1
          fi
          curl -fsSL "$CLARION_DOWNLOAD_URL" -o /usr/local/bin/clarion
          chmod +x /usr/local/bin/clarion

      - name: Run review-required demo
        env:
          CLARION_BIN: /usr/local/bin/clarion
        run: bash scripts/demo-review-required.sh

      - name: Verify review-required artifacts
        run: |
          test -f artifacts/review-required/result.json
          test -f artifacts/review-required/review-required-report.md
          node scripts/assert-output-safe.js artifacts/review-required/review-required-report.md

      - name: Run trial on minimal repo
        env:
          CLARION_BIN: /usr/local/bin/clarion
        run: bash scripts/demo-trial-empty-repo.sh

      - name: Verify minimal-repo artifacts
        run: |
          test -f artifacts/trial-empty-repo/empty-repo-summary.md
          test -f artifacts/trial-empty-repo/run.log
          if [ ! -f artifacts/trial-empty-repo/report/clarion_trial_report.md ] && [ ! -f artifacts/trial-empty-repo/bridge_report.md ]; then
            echo "ERROR: neither canonical nor bridge report was produced"
            exit 1
          fi
          node scripts/assert-output-safe.js artifacts/trial-empty-repo/empty-repo-summary.md
